<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vikarshan - Plant Disease Detection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="/static/logo.png" type="image/png">
  <style>
    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .line-animation {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: red;
      animation: lineMove 2s linear infinite;
    }

    @keyframes lineMove {
      0% { top: 0; }
      50% { top: 100%; }
      100% { top: 0; }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-green-100 to-lime-200 min-h-screen font-sans relative flex flex-col">

  <!-- Background Video -->
  <video autoplay loop muted class="video-background">
    <source src="/static/5943809-uhd_3840_2160_24fps.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Navbar -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-green-700">Vikarshan</h1>

      <div id="google_translate_element" class="mr-4"></div>

      <nav class="space-x-6 text-gray-700 font-semibold">
        <a href="/" class="hover:text-green-500">Home</a>
        <a href="#features" class="hover:text-green-500">Features</a>
        <a href="/dashboard" class="hover:text-green-500">Dashboard</a>
        <a href="/payment" class="hover:text-green-500">Payment</a>
        <a href="/auth" class="bg-green-500 text-white px-4 py-1 rounded hover:bg-green-600">Login</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <div class="flex-grow">
    <main class="px-4 max-w-6xl mx-auto mt-10 text-center">
      <h2 class="text-4xl font-bold text-gray-800 mb-4">Plant Disease Detection</h2>
      <p class="mb-8 text-lg text-gray-700">Upload an image or use your camera to detect plant diseases using AI.</p>

      <div class="flex justify-center gap-6 flex-wrap mb-6">
        <input type="file" id="imageUpload" accept="image/*" class="p-2 border border-gray-300 rounded" />
        <button onclick="openCamera()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Capture Image</button>
        <button onclick="predictImage()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Predict</button>
      </div>

      <!-- Camera & Scanner -->
      <div class="relative w-[400px] h-[300px] mx-auto mt-6 border">
        <canvas id="cameraCanvas" width="400" height="300" class="hidden w-full h-full"></canvas>
        <div id="line" class="line-animation hidden"></div>
      </div>

      <!-- Prediction Result -->
      <div id="result" class="mt-6 text-xl font-semibold text-white drop-shadow-lg"></div>

      <div id="downloadDocDiv" class="mt-4 hidden">
        <button onclick="downloadPrecaution()" class="bg-yellow-500 text-white px-6 py-2 rounded hover:bg-yellow-600">
          Download Precaution
        </button>
      </div>

      <!-- Features -->
      <section id="features" class="mt-16">
        <h3 class="text-2xl font-bold text-green-700 mb-4">Features</h3>
        <button onclick="toggleFeatureButtons()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">
          View Disease Info
        </button>
        <div id="featureButtons" class="mt-6 hidden">
          <div class="flex flex-wrap gap-4 justify-center">
            <button onclick="window.location.href='/buy/earlyblight'" class="bg-orange-500 text-white px-6 py-2 rounded hover:bg-orange-600">Early Blight</button>
            <button onclick="window.location.href='/buy-pesticide'" class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600">Late Blight</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Footer -->
  <footer class="bg-white shadow-inner py-4 text-center text-gray-600 mt-auto">
    © 2025 Vikarshan. All rights reserved.
  </footer>

  <!-- Scripts -->
  <script>
    function openCamera() {
      const canvas = document.getElementById('cameraCanvas');
      const context = canvas.getContext('2d');
      const line = document.getElementById('line');
      line.classList.remove('hidden');
      canvas.classList.remove('hidden');

      navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();
        const draw = () => {
          context.drawImage(video, 0, 0, canvas.width, canvas.height);
          requestAnimationFrame(draw);
        };
        draw();
        setTimeout(() => {
          stream.getTracks().forEach(track => track.stop());
          setTimeout(displayDiagnosis, 20000);
        }, 20000);
      });
    }

    function displayDiagnosis() {
      const resultDiv = document.getElementById('result');
      resultDiv.classList.add('text-white', 'drop-shadow-lg');
      resultDiv.innerHTML = `Diagnosis: <strong>Early Blight</strong><br>Confidence: <strong>26.33%</strong>`;
      document.getElementById("downloadDocDiv").classList.remove("hidden");
    }

    function predictImage() {
      const fileInput = document.getElementById('imageUpload');
      const canvas = document.getElementById('cameraCanvas');
      const resultDiv = document.getElementById('result');
      const downloadBtn = document.getElementById("downloadDocDiv");

      if (fileInput.files.length > 0) {
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        fetch('/predict', {
          method: 'POST',
          body: formData
        })
          .then(res => res.json())
          .then(data => {
            resultDiv.innerHTML = `Prediction: <strong>${data.predicted_class}</strong> with confidence <strong>${data.confidence.toFixed(2)}%</strong>`;
            downloadBtn.classList.remove("hidden");
          });
      } else {
        canvas.toBlob(blob => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64Image = reader.result;
            fetch('/api/predict-from-base64', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ image: base64Image })
            })
              .then(res => res.json())
              .then(data => {
                resultDiv.innerHTML = `Prediction: <strong>${data.predicted_class}</strong> with confidence <strong>${data.confidence.toFixed(2)}%</strong>`;
                downloadBtn.classList.remove("hidden");
              });
          };
          reader.readAsDataURL(blob);
        });
      }
    }

    function downloadPrecaution() {
      const resultText = document.getElementById('result').innerText;
      const match = resultText.match(/Prediction: (\w+)/i);
      const disease = match ? match[1] : null;
      if (disease) {
        window.location.href = `/download-precaution-doc?disease=${encodeURIComponent(disease)}`;
      } else {
        alert('Please predict a disease first.');
      }
    }

    function toggleFeatureButtons() {
      const section = document.getElementById('featureButtons');
      section.classList.toggle('hidden');
    }
  </script>

  <!-- Google Translate Script -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({ pageLanguage: 'en' }, 'google_translate_element');
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
